<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Landing Protocol [V15 - Mobile Perfect & Fade-In]</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000000 80%);
      color: #ff0033;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* Заборона виділення тексту на телефоні (щоб не було синього екрана при випадковому тапі) */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1;
      animation: neonPulse 2s infinite alternate ease-in-out;
    }

    @keyframes neonPulse {
      0% { box-shadow: inset 0 0 20px rgba(255, 0, 51, 0.1), inset 0 0 50px rgba(255, 0, 51, 0.05); }
      100% { box-shadow: inset 0 0 60px rgba(255, 0, 51, 0.5), inset 0 0 120px rgba(255, 0, 51, 0.2); }
    }

    #landing {
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.5s ease;
      padding: 0 20px; /* Відступи для мобільних екранів */
    }

    #status-text {
      color: #777;
      font-size: 14px;
      letter-spacing: 1px;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    button {
      background: rgba(255, 0, 51, 0.05);
      border: 1px solid rgba(255, 0, 51, 0.5);
      color: #ff0033;
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 0, 51, 0.1);
      text-transform: uppercase;
      letter-spacing: 2px;
      /* Щоб кнопка не виглядала стандартною на iPhone */
      -webkit-appearance: none;
      border-radius: 0;
    }

    button:hover, button:active {
      background: #ff0033;
      color: #050001;
      box-shadow: 0 0 20px rgba(255, 0, 51, 0.4);
      border-color: #ff0033;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

<div id="landing">
  <div id="status-text">> ONE ENCRYPTED PACKAGE FOUND FOR "I"</div>
  <button id="decryptBtn">🔒 DECRYPT MESSAGE</button>
</div>

<canvas id="heartCanvas"></canvas>

<script>
  const canvas = document.getElementById('heartCanvas');
  const ctx = canvas.getContext('2d');
  const btn = document.getElementById('decryptBtn');
  const landing = document.getElementById('landing');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let particles = [];
  let isAnimating = false;

  function getHeartPoint(t, scale) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * scale, y: y * scale };
  }

  class Particle {
    constructor() {
      // Визначаємо, чи це мобільний екран (ширина менше 600px)
      // Якщо так, зменшуємо розмір серця, щоб воно влізло
      const isMobile = window.innerWidth < 600;
      const mobileScale = isMobile ? 0.5 : 1; // На телефоні серце буде вдвічі меншим від базового розміру

      let validPoint = false;
      while (!validPoint) {
        this.t = Math.random() * Math.PI * 2;
        let rawX = 16 * Math.pow(Math.sin(this.t), 3);
        
        if (Math.abs(rawX) < 3 && Math.random() < 0.8) {
          validPoint = false; 
        } else {
          validPoint = true;
        }
      }

      // Застосовуємо мобільний масштаб до розміру серця
      if (Math.random() > 0.25) {
        this.baseScale = (Math.random() * 3 + 15) * mobileScale; 
      } else {
        this.baseScale = (Math.random() * 7 + 8) * mobileScale;  
      }

      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;

      this.speed = Math.random() * 0.04 + 0.015;

      const phrases = ["I love you", "B + I", "<3", "Love Story"];
      this.text = phrases[Math.floor(Math.random() * phrases.length)];
      
      // На телефоні шрифт також трохи зменшуємо для акуратності
      const baseFontSize = Math.floor(Math.random() * 5 + 9);
      this.fontSize = isMobile ? baseFontSize * 0.8 : baseFontSize;

      this.targetOpacity = Math.random() * 0.5 + 0.4;
      this.currentOpacity = 0; 
    }

    update() {
      const time = Date.now() / 250;
      const pulse = 1 + 0.04 * Math.sin(time);

      const targetPoint = getHeartPoint(this.t, this.baseScale * pulse);
      
      const currentTargetX = canvas.width / 2 + targetPoint.x;
      const currentTargetY = canvas.height / 2 + targetPoint.y - (window.innerWidth < 600 ? 20 : 40);

      this.x += (currentTargetX - this.x) * this.speed;
      this.y += (currentTargetY - this.y) * this.speed;

      this.currentOpacity += (this.targetOpacity - this.currentOpacity) * (this.speed * 1.5);
    }

    draw() {
      ctx.font = `bold ${this.fontSize}px 'Courier New'`;
      ctx.fillStyle = `rgba(255, 0, 51, ${this.currentOpacity})`;
      ctx.shadowBlur = 4;
      ctx.shadowColor = `rgba(255, 0, 51, ${this.currentOpacity})`;
      ctx.fillText(this.text, this.x, this.y);
    }
  }

  function createParticles() {
    // На телефоні можна залишити стільки ж частинок, буде виглядати ще щільніше і крутіше
    for (let i = 0; i < 700; i++) {
      particles.push(new Particle());
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    if (isAnimating) {
      requestAnimationFrame(animate);
    }
  }

  btn.addEventListener('click', () => {
    landing.style.opacity = '0';
    setTimeout(() => { landing.style.display = 'none'; }, 500);

    if (!isAnimating) {
      isAnimating = true;
      createParticles();
      animate();
    }
  });
</script>
</body>
</html>
